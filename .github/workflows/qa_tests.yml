name: Pruebas Automatizadas QA

on:
  push:
    branches: [ "main" ]

jobs:
  ejecutar-pruebas:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el código
      uses: actions/checkout@v3

    - name: 2. Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Ejecutar pruebas con Pytest
      env:
        SAUCE_URL: ${{ secrets.SAUCE_URL }}
        SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
        SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
      run: |
        pytest -v